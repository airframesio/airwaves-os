name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v1.0.0-alpha)"
        required: true
        type: string
      skipImages:
        description: "Skip OS image builds?"
        required: false
        default: "no"
        type: choice
        options: ["no", "yes"]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/airframesio
  BUILD_REPOSITORY: armbian/build
  BUILD_REF: v25.02
  USERPATCHES_REPOSITORY: airframesio/airwaves-os
  USERPATCHES_DIR: armbian/userpatches
  CONTROL_APP_REPO: airframesio/airwaves-os-control

jobs:

  build-manager:
    name: Build manager container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/setup-qemu-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/airwaves-manager
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: containers/airwaves-manager
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-gateway:
    name: Build gateway container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Clone control app
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CONTROL_APP_REPO }}
          path: containers/airwaves-gateway/control-app
          token: ${{ secrets.CONTROL_APP_TOKEN || secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/setup-qemu-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/airwaves-gateway
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: containers/airwaves-gateway
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  export-tarballs:
    name: Export tarballs (${{ matrix.arch }})
    needs: [build-manager, build-gateway]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Export images
        run: |
          for image in airwaves-gateway airwaves-manager; do
            docker pull --platform "linux/${{ matrix.arch }}" "${{ env.IMAGE_PREFIX }}/${image}:latest"
            docker save "${{ env.IMAGE_PREFIX }}/${image}:latest" -o "${image}-${{ matrix.arch }}.tar"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: container-tarballs-${{ matrix.arch }}
          path: "*.tar"
          retention-days: 7

  create-release:
    name: Create release
    needs: [build-manager, build-gateway, export-tarballs]
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download tarballs
        uses: actions/download-artifact@v4
        with:
          pattern: container-tarballs-*
          merge-multiple: true
          path: artifacts/

      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: echo "tag=${INPUT_VERSION:-$REF_NAME}" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        env:
          TAG: ${{ steps.version.outputs.tag }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Airwaves OS ${{ steps.version.outputs.tag }}"
          generate_release_notes: true
          files: artifacts/*.tar
