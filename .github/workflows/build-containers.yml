name: Build Containers

on:
  push:
    branches: [main, modernize-base-os]
    paths:
      - "containers/**"
  workflow_dispatch:
    inputs:
      container:
        description: "Container to build (or 'all')"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - airwaves-gateway

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/airframesio

jobs:

  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            gateway:
              - 'containers/airwaves-gateway/**'

  build-gateway:
    name: Build airwaves-gateway
    needs: [changes]
    if: ${{ needs.changes.outputs.gateway == 'true' || github.event.inputs.container == 'all' || github.event.inputs.container == 'airwaves-gateway' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:

      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/airwaves-gateway
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: containers/airwaves-gateway
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  export-images:
    name: Export container tarballs (${{ matrix.arch }})
    needs: [build-gateway]
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and export gateway image
        run: |
          docker pull --platform "linux/${{ matrix.arch }}" "${{ env.IMAGE_PREFIX }}/airwaves-gateway:latest"
          docker save "${{ env.IMAGE_PREFIX }}/airwaves-gateway:latest" -o "airwaves-gateway-${{ matrix.arch }}.tar"

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: container-images-${{ matrix.arch }}
          path: "*.tar"
          retention-days: 30
