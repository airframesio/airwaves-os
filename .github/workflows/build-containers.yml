name: Build Containers

# Channel model:
#   - push to main          -> "dev" channel    (image tag: dev)
#   - push to beta branch   -> "beta" channel   (image tag: beta)
#   - push tag v*           -> "stable" channel (image tags: stable + latest)
#   - workflow_dispatch     -> choose channel (auto = infer from branch)
# Every build also publishes an immutable version tag (from Cargo.toml /
# control-app package.json) and a sha- tag, so updates can pin exact versions.

on:
  push:
    branches: [main, beta, modernize-base-os]
    paths:
      - "containers/**"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      container:
        description: "Container to build (or 'all')"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - airwaves-gateway
          - airwaves-manager
      channel:
        description: "Channel to publish (auto = infer from branch)"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - stable
          - beta
          - dev

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/airframesio
  CONTROL_APP_REPO: airframesio/airwaves-os-control

jobs:

  setup:
    name: Setup (channel + changes)
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.chan.outputs.channel }}
      is_stable: ${{ steps.chan.outputs.is_stable }}
      gateway: ${{ steps.filter.outputs.gateway }}
      manager: ${{ steps.filter.outputs.manager }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine channel
        id: chan
        env:
          REF: ${{ github.ref }}
          INPUT_CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          channel="dev"
          if [ -n "${INPUT_CHANNEL}" ] && [ "${INPUT_CHANNEL}" != "auto" ]; then
            channel="${INPUT_CHANNEL}"
          elif [[ "${REF}" == refs/tags/v* ]]; then
            channel="stable"
          elif [ "${REF}" = "refs/heads/beta" ]; then
            channel="beta"
          else
            channel="dev"
          fi
          is_stable="false"
          [ "${channel}" = "stable" ] && is_stable="true"
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"
          echo "is_stable=${is_stable}" >> "$GITHUB_OUTPUT"
          echo "Resolved channel: ${channel} (is_stable=${is_stable})"

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            gateway:
              - 'containers/airwaves-gateway/**'
            manager:
              - 'containers/airwaves-manager/**'

  build-gateway:
    name: Build airwaves-gateway
    needs: [setup]
    if: ${{ needs.setup.outputs.gateway == 'true' || github.event.inputs.container == 'all' || github.event.inputs.container == 'airwaves-gateway' || startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:

      - uses: actions/checkout@v4

      - name: Clone control app
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CONTROL_APP_REPO }}
          path: containers/airwaves-gateway/control-app
          token: ${{ secrets.CONTROL_APP_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Read control-app version
        id: ctrlver
        run: |
          VERSION="unknown"
          if [ -f containers/airwaves-gateway/control-app/package.json ]; then
            VERSION="$(jq -r '.version // "unknown"' containers/airwaves-gateway/control-app/package.json)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Control-app version: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/airwaves-gateway
          tags: |
            type=sha
            type=raw,value=${{ steps.ctrlver.outputs.version }},enable=${{ steps.ctrlver.outputs.version != 'unknown' }}
            type=raw,value=${{ needs.setup.outputs.channel }}
            type=raw,value=latest,enable=${{ needs.setup.outputs.is_stable == 'true' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: containers/airwaves-gateway
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            CONTROL_APP_VERSION=${{ steps.ctrlver.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-manager:
    name: Build airwaves-manager
    needs: [setup]
    if: ${{ needs.setup.outputs.manager == 'true' || github.event.inputs.container == 'all' || github.event.inputs.container == 'airwaves-manager' || startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:

      - uses: actions/checkout@v4

      - name: Read manager version
        id: mgrver
        run: |
          VERSION="$(grep -m1 '^version' containers/airwaves-manager/Cargo.toml | cut -d'"' -f2)"
          echo "version=${VERSION:-unknown}" >> "$GITHUB_OUTPUT"
          echo "Manager version: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/airwaves-manager
          tags: |
            type=sha
            type=raw,value=${{ steps.mgrver.outputs.version }},enable=${{ steps.mgrver.outputs.version != 'unknown' }}
            type=raw,value=${{ needs.setup.outputs.channel }}
            type=raw,value=latest,enable=${{ needs.setup.outputs.is_stable == 'true' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: containers/airwaves-manager
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  export-images:
    name: Export container tarballs (${{ matrix.arch }})
    needs: [setup, build-gateway, build-manager]
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and export images
        env:
          CHANNEL: ${{ needs.setup.outputs.channel }}
        run: |
          for image in airwaves-gateway airwaves-manager; do
            docker pull --platform "linux/${{ matrix.arch }}" "${{ env.IMAGE_PREFIX }}/${image}:${CHANNEL}" || true
            docker save "${{ env.IMAGE_PREFIX }}/${image}:${CHANNEL}" -o "${image}-${{ matrix.arch }}.tar" || true
          done
      - name: Upload tarballs
        uses: actions/upload-artifact@v4
        with:
          name: container-images-${{ matrix.arch }}-${{ needs.setup.outputs.channel }}
          path: "*.tar"
          retention-days: 30
