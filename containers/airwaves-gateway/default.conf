server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"airwaves-gateway"}';
        add_header Content-Type application/json;
    }

    # API proxy (will route to airwaves-manager container)
    # Uncomment when manager container is ready:
    # location /api/ {
    #     set $manager airwaves-manager;
    #     proxy_pass http://$manager:8080;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # Default: serve web management app
    location / {
        try_files $uri $uri/ /index.html;
    }
}
