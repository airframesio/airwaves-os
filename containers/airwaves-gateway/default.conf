server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"airwaves-gateway"}';
        add_header Content-Type application/json;
    }

    # API proxy to airwaves-manager container
    location /api/ {
        set $manager airwaves-manager;
        proxy_pass http://$manager:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # WebSocket proxy for real-time events and log streaming
    location /ws/ {
        set $manager airwaves-manager;
        proxy_pass http://$manager:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Dynamic app web UI proxies (generated by airwaves-manager)
    # Includes configs like: location /apps/tar1090/ { proxy_pass http://airwaves-tar1090:80/; }
    include /etc/airwaves/nginx/apps.conf*;

    # Serve the Airwaves OS Control web app (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
