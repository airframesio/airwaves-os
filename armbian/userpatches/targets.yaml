common-gha-configs:
  airwaves-gha: &airwaves-gha
    runners:
      default: "ubuntu-latest"
      by-name:
        kernel: ["self-hosted", "Linux", "armbian", "artifact-kernel"]
        uboot: ["self-hosted", "Linux", "armbian", "X64"]
      by-name-and-arch:
        rootfs-arm64: ["self-hosted", "Linux", "armbian", "rootfs-arm64"]
        image-arm64: ["self-hosted", "Linux", "armbian", "image-arm64"]
        rootfs-armhf: ["self-hosted", "Linux", "armbian", "rootfs-armhf"]
        image-armhf: ["self-hosted", "Linux", "armbian", "image-armhf"]

lists:

  # Tier 1: Primary supported boards (Debian Trixie)
  tier1-boards: &tier1-boards
    # rk3588 boards use the vendor (Rockchip BSP) kernel: the mainline "current"
    # kernel breaks on Armbian patch drift and has weaker rk3588 support (NVMe,
    # GPU). x86 stays on current.
    - { BOARD: rock-5b, BRANCH: vendor }
    - { BOARD: rock-5a, BRANCH: vendor }
    - { BOARD: orangepi5, BRANCH: vendor }
    - { BOARD: orangepi5-plus, BRANCH: vendor }
    - { BOARD: uefi-x86, BRANCH: current }

  # Tier 1: RPi boards (Ubuntu Noble - requires flash-kernel)
  tier1-boards-rpi: &tier1-boards-rpi
    - { BOARD: rpi4b, BRANCH: current, RELEASE: noble }

  # Tier 1: Bookworm (legacy, for users who need Debian stable)
  tier1-boards-bookworm: &tier1-boards-bookworm
    # rk3588 on the vendor (Rockchip BSP) kernel; x86 on current. See note above.
    - { BOARD: rock-5b, BRANCH: vendor }
    - { BOARD: rock-5a, BRANCH: vendor }
    - { BOARD: orangepi5, BRANCH: vendor }
    - { BOARD: orangepi5-plus, BRANCH: vendor }
    - { BOARD: uefi-x86, BRANCH: current }

  # Tier 2: Extended popular boards (Debian Trixie). All arm64 (the manager +
  # gateway containers are arm64-only). rk3588 -> vendor (Rockchip BSP); the
  # Amlogic/Allwinner boards -> current (mainline). Verified against Armbian
  # v26.2.1 board configs (KERNEL_TARGET).
  tier2-boards: &tier2-boards
    - { BOARD: rock-5c, BRANCH: vendor }        # Radxa ROCK 5C (rk3588)
    - { BOARD: rock-5b-plus, BRANCH: vendor }   # Radxa ROCK 5B Plus (rk3588; no current branch)
    - { BOARD: nanopct6, BRANCH: vendor }       # FriendlyELEC NanoPC-T6 (rk3588)
    - { BOARD: nanopi-r6s, BRANCH: vendor }     # FriendlyELEC NanoPi R6S (rk3588)
    - { BOARD: odroidn2, BRANCH: current }      # Hardkernel Odroid N2/N2+ (meson-g12b)
    - { BOARD: odroidc4, BRANCH: current }      # Hardkernel Odroid C4 (meson-sm1)
    - { BOARD: orangepizero3, BRANCH: current } # Orange Pi Zero 3 (Allwinner H618)
    - { BOARD: orangepi3-lts, BRANCH: current } # Orange Pi 3 LTS (Allwinner H6)
    - { BOARD: lepotato, BRANCH: current }      # Libre Computer Le Potato (meson-gxl)
    - { BOARD: khadas-vim3, BRANCH: current }   # Khadas VIM3 (meson-g12b)

  # Tier 3: Further popular arm64 boards. Branch = each board's first (Armbian-
  # recommended) KERNEL_TARGET at v26.2.1: rk3588 -> vendor; rk356x/rk3399/Amlogic
  # /Allwinner -> current, except orangepi3b/radxa-zero3 whose configs default to
  # vendor.
  tier3-boards: &tier3-boards
    - { BOARD: rock-5t, BRANCH: vendor }         # Radxa ROCK 5T (rk3588, vendor-only)
    - { BOARD: orangepi5-max, BRANCH: vendor }   # Orange Pi 5 Max (rk3588)
    - { BOARD: orangepi3b, BRANCH: vendor }      # Orange Pi 3B (rk3566; config defaults vendor)
    - { BOARD: radxa-zero3, BRANCH: vendor }     # Radxa ZERO 3 (rk3566; config defaults vendor)
    - { BOARD: rock-3a, BRANCH: current }        # Radxa ROCK 3A (rk3568)
    - { BOARD: odroidm1, BRANCH: current }       # Hardkernel Odroid M1 (rk3568)
    - { BOARD: odroidc2, BRANCH: current }       # Hardkernel Odroid C2 (Amlogic S905)
    - { BOARD: orangepizero2w, BRANCH: current } # Orange Pi Zero 2W (Allwinner H618)
    - { BOARD: nanopi-r4s, BRANCH: current }     # FriendlyELEC NanoPi R4S (rk3399)
    - { BOARD: orangepi4-lts, BRANCH: current }  # Orange Pi 4 LTS (rk3399)

targets:

  # Primary: Debian Trixie for ARM and x86 boards
  cli-trixie:
    enabled: yes
    configs: [airwaves]
    pipeline:
      gha: *airwaves-gha
    vars:
      RELEASE: trixie
      BUILD_MINIMAL: "yes"
      CLOUD_IMAGE: "no"
    items:
      - *tier1-boards
      - *tier2-boards
      - *tier3-boards

  # Legacy: Debian Bookworm (community support in Armbian v26.2)
  cli-bookworm:
    enabled: yes
    configs: [airwaves]
    pipeline:
      gha: *airwaves-gha
    vars:
      RELEASE: bookworm
      BUILD_MINIMAL: "yes"
      CLOUD_IMAGE: "no"
    items:
      - *tier1-boards-bookworm

  # RPi: Ubuntu Noble (required for flash-kernel)
  cli-noble:
    enabled: yes
    configs: [airwaves]
    pipeline:
      gha: *airwaves-gha
    vars:
      RELEASE: noble
      BUILD_MINIMAL: "yes"
      CLOUD_IMAGE: "no"
    items:
      - *tier1-boards-rpi
