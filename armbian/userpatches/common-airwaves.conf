display_alert "Include" "common-airwaves" "info"

# Extensions
enable_extension "airwaves-base"
enable_extension "airwaves-docker"
enable_extension "airwaves-networking"
enable_extension "airwaves-hardware"
enable_extension "airwaves-installer"

# Base OS settings
declare -g BUILD_MINIMAL="yes"
declare -g BUILD_DESKTOP="no"
declare -g KERNEL_CONFIGURE="no"

# Branding
declare -g VENDOR="Airwaves_OS"
declare -g MAINTAINER="Airframes"
declare -g MAINTAINEREMAIL="maintainer@airframes.io"

# Defaults
declare -g ROOTPWD="airwaves"
declare -g HOST="airwaves"
declare -g DEST_LANG="en_US.UTF-8"

# Build output
declare -g COMPRESS_OUTPUTIMAGE="img,sha,xz"
declare -g EXPERT="yes"
declare -g PROGRESS_LOG_TO_FILE="yes"
declare -g SHOW_DEBUG="no"
declare -g SHOW_COMMANDS="no"

# Feature toggles
declare -g WIREGUARD="no"
declare -g EXTRA_WIFI="yes"
declare -g AUFS="no"
declare -g SYNC_CLOCK="no"

function user_config__airwaves_skip_t2_patches() {
	if [[ "${BOARD}" == "uefi-x86" ]]; then
		display_alert "Skipping Apple T2 kernel patches" "not needed for generic x86/VM" "info"
		declare -g KERNELPATCHDIR=""
	fi
}

# Enable a serial console on x86 in addition to VGA. Set here (user_config runs
# AFTER the board config) so it overrides uefi-x86's default SERIALCON=tty1;
# Armbian's grub extension then expands this to `console=tty0 console=ttyS0`,
# so a monitor (tty1, first-run wizard) and serial/IPMI both work, and
# serial-getty@ttyS0 is enabled. Also unblocks automated headless VM testing.
function user_config__airwaves_serial_console() {
	if [[ "${BOARD}" == "uefi-x86" ]]; then
		display_alert "Enabling serial console for x86" "SERIALCON=ttyS0" "info"
		declare -g SERIALCON="ttyS0"
	fi
}

# Brand the x86 GRUB menu as "Airwaves OS v<version>" instead of Armbian. Armbian's
# grub extension writes GRUB_DISTRIBUTOR="${UEFI_GRUB_DISTRO_NAME}" into
# /etc/default/grub.d/98-armbian.cfg, leaving an inner $(...) literal — so a
# command-substitution value is evaluated live by grub-mkconfig from
# /etc/airwaves-release. The title auto-updates with the OS version (and per A/B
# slot) with no re-baking.
function user_config__airwaves_grub_distro() {
	if [[ "${BOARD}" == "uefi-x86" ]]; then
		display_alert "Branding GRUB menu" "Airwaves OS v<version>" "info"
		declare -g UEFI_GRUB_DISTRO_NAME='$(. /etc/airwaves-release 2>/dev/null; echo Airwaves OS v${AIRWAVES_VERSION:-})'
	fi
}

function run_after_build__export_image_version_to_gha() {
    github_actions_add_output "armbian_image_version" "${version}"
}
