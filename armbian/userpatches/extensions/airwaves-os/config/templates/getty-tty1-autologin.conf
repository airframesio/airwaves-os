# Airwaves OS: own tty1 with an autologin session that launches the console TUI
# (/opt/airwaves/scripts/airwaves-tui, started from /etc/profile.d). getty's own
# respawn guarantees tty1 always has a live session — if the TUI ever exits,
# getty relaunches it, so the console can never dead-end. Serial console
# (serial-getty@ttyS0) and SSH are unaffected and still require a normal login.
[Service]
ExecStart=
ExecStart=-/sbin/agetty --autologin root --noclear %I $TERM
